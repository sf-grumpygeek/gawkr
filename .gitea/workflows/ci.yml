name: ci
on: [push, pull_request]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: byte-compile the bridge + web
        run: |
          python3 -m py_compile bridge/gawkr/*.py web/app.py
